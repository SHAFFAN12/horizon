<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon OOH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <div class="demo-cont">
        <!-- slider start -->
        <div class="fnc-slider example-slider">
            <div class="fnc-slider__slides">
                <!-- slide 1: Home -->
                <div class="fnc-slide m--blend-gold m--active-slide">
                    <div class="fnc-slide__inner">
                        <img src="assets/logo.png" class="slide-logo" alt="Horizon OOH Logo">
                        <div class="fnc-slide__mask">
                            <div class="fnc-slide__mask-inner"></div>
                        </div>
                        <div class="fnc-slide__content">
                            <h2 class="fnc-slide__heading">
                                <div class="fnc-slide__heading-line">
                                    <span>Welcome</span>
                                </div>
                                <div class="fnc-slide__heading-line">
                                    <span>to Horizon</span>
                                </div>
                            </h2>
                            <button type="button" class="fnc-slide__action-btn">
                                See Sites
                                <span data-text="See Sites">See Sites</span>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- slide 1 end -->
                <!-- slide 2: About Us -->
                <div class="fnc-slide m--blend-navy m--no-image">
                    <div class="fnc-slide__inner">
                        <img src="assets/logo.png" class="slide-logo" alt="Horizon OOH Logo">
                        <div class="fnc-slide__mask">
                            <div class="fnc-slide__mask-inner"></div>
                        </div>
                        <div class="fnc-slide__content">
                            <h2 class="fnc-slide__heading">
                                <div class="fnc-slide__heading-line">
                                    <span>About</span>
                                </div>
                                <div class="fnc-slide__heading-line">
                                    <span>Us</span>
                                </div>
                            </h2>
                            <div class="slide-text-content">
                                <p>We are a premier Outdoor Advertising Agency.</p>
                                <p>Bringing your brand to life with high-impact visuals.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- slide 2 end -->
                <!-- slide 3: Projects -->
                <div class="fnc-slide m--blend-gold m--no-image">
                    <div class="fnc-slide__inner">
                        <img src="assets/logo.png" class="slide-logo" alt="Horizon OOH Logo">
                        <div class="fnc-slide__mask">
                            <div class="fnc-slide__mask-inner"></div>
                        </div>
                        <div class="fnc-slide__content project-slide-content">
                            <h2 class="fnc-slide__heading">
                                <div class="fnc-slide__heading-line">
                                    <span>Our Projects</span>
                                </div>
                            </h2>
                            <!-- Central Line Project Structure -->
                            <div class="timeline-container">
                                <div class="timeline-line"></div>
                                <div class="timeline-items">
                                    <div class="timeline-item">
                                        <a href="project.html" target="_blank"
                                            onclick="window.open('project.html', 'newwindow', 'width=800,height=600'); return false;">
                                            <div class="timeline-content">
                                                <img src="assets/billboard.jpg" alt="Mega Hoardings">
                                                <span>Mega Hoardings</span>
                                            </div>
                                        </a>
                                    </div>
                                    <div class="timeline-item">
                                        <a href="project.html" target="_blank"
                                            onclick="window.open('project.html', 'newwindow', 'width=800,height=600'); return false;">
                                            <div class="timeline-content">
                                                <img src="assets/slide-2.png" alt="Transit Media">
                                                <span>Transit Media</span>
                                            </div>
                                        </a>
                                    </div>
                                    <div class="timeline-item">
                                        <a href="project.html" target="_blank"
                                            onclick="window.open('project.html', 'newwindow', 'width=800,height=600'); return false;">
                                            <div class="timeline-content">
                                                <img src="assets/slide.jpeg" alt="Digital OOH">
                                                <span>Digital OOH</span>
                                            </div>
                                        </a>
                                    </div>
                                    <div class="timeline-item">
                                        <a href="project.html" target="_blank"
                                            onclick="window.open('project.html', 'newwindow', 'width=800,height=600'); return false;">
                                            <div class="timeline-content">
                                                <img src="assets/slide.jpeg" alt="Street Furniture">
                                                <span>Street Furniture</span>
                                            </div>
                                        </a>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                <!-- slide 3 end -->
                <!-- slide 4: Contact -->
                <div class="fnc-slide m--blend-navy m--no-image contact-slide">
                    <div class="fnc-slide__inner">
                        <img src="assets/logo.png" class="slide-logo" alt="Horizon OOH Logo">
                        <div class="fnc-slide__mask">
                            <div class="fnc-slide__mask-inner"></div>
                        </div>

                        <!-- Wooden Billboard Scene -->
                        <div class="billboard-scene">
                            <!-- Legs -->
                            <div class="billboard-leg leg-left"></div>
                            <div class="billboard-leg leg-right"></div>

                            <!-- Main Board -->
                            <div class="billboard-structure">
                                <div class="billboard-frame">
                                    <div class="billboard-board">
                                        <!-- Top Lights -->
                                        <div class="billboard-lights">
                                            <div class="light light-1"></div>
                                            <div class="light light-2"></div>
                                            <div class="light light-3"></div>
                                        </div>

                                        <!-- Content -->
                                        <div class="billboard-content">
                                            <h2 class="billboard-title">GET IN TOUCH</h2>
                                            <p class="billboard-subtitle">Advertise with us today!</p>

                                            <form class="contact-form">
                                                <div class="form-group">
                                                    <input type="text" placeholder="Your Name" required>
                                                </div>
                                                <div class="form-group">
                                                    <input type="email" placeholder="Your Email" required>
                                                </div>
                                                <div class="form-group">
                                                    <textarea placeholder="Your Message" rows="3" required></textarea>
                                                </div>
                                                <button type="submit" class="submit-btn">SEND MESSAGE</button>
                                            </form>

                                            <div class="contact-info-small">
                                                <span>info@horizonooh.com</span> | <span>+1 234 567 890</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- slide 4 end -->
            </div>
            <nav class="fnc-nav">
                <div class="fnc-nav__bgs">
                    <div class="fnc-nav__bg m--navbg-gold m--active-nav-bg"></div>
                    <div class="fnc-nav__bg m--navbg-navy"></div>
                    <div class="fnc-nav__bg m--navbg-gold"></div>
                    <div class="fnc-nav__bg m--navbg-navy"></div>
                </div>
                <div class="fnc-nav__controls">
                    <button class="fnc-nav__control">
                        Home
                        <span class="fnc-nav__control-progress"></span>
                    </button>
                    <button class="fnc-nav__control">
                        About
                        <span class="fnc-nav__control-progress"></span>
                    </button>
                    <button class="fnc-nav__control">
                        Projects
                        <span class="fnc-nav__control-progress"></span>
                    </button>
                    <button class="fnc-nav__control">
                        Contact
                        <span class="fnc-nav__control-progress"></span>
                    </button>
                </div>
            </nav>
        </div>
        <!-- slider end -->
    </div>

    <script src="script.js"></script>
</body>

</html>
